arm:
  kinematics_solver: pick_ik/PickIkPlugin
  kinematics_solver_timeout: 0.05
  kinematics_solver_attempts: 3
  # local mode uses gradient descent (GD) from the provided seed joint state.
  # This resolves two conflicting requirements simultaneously:
  #
  # 1. OMPL goal sampling: GD from random seeds always converges to a valid
  #    local IK solution. With mode: global + minimal_displacement_weight: 0.1
  #    + cost_threshold: 0.001, random seeds caused every IK call to exceed the
  #    combined cost threshold (displacement alone = 0.1 * sum_dq^2 >> 0.001),
  #    making OMPL unable to sample any valid goal states at all.
  #
  # 2. PILZ LIN branch consistency: GD from the previous waypoint's joint
  #    configuration stays in the local neighbourhood of that configuration,
  #    naturally tracking the same IK branch across the entire Cartesian path.
  #    This prevents the branch-jump failures that occurred with mode: global.
  mode: local
  position_scale: 1.0
  rotation_scale: 0.5
  position_threshold: 0.001
  orientation_threshold: 0.01
  cost_threshold: 0.001
  minimal_displacement_weight: 0.0
  gd_step_size: 0.0001
